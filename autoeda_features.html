<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: transparent; padding: 16px; }

@media (prefers-color-scheme: dark) {
  body { color: #e0e0e0; }
  .card { background: #1e1e1e; border-color: #2e2e2e; }
  .card:hover { border-color: #444; background: #222; }
  .card.selected { border-color: #7c6ef5; background: #1a1830; }
  .phase-bar { background: #2a2a2a; }
  .tag { background: #2a2a2a; color: #bbb; }
  .tag.core { background: #1a2a1a; color: #6fcf97; }
  .tag.ai { background: #1a1830; color: #a89cf5; }
  .tag.platform { background: #1e2a30; color: #5ba3d9; }
  .tag.enterprise { background: #2a1f0d; color: #e0b84d; }
  .tag.future { background: #2a1a1a; color: #e07070; }
  .detail { background: #222; border-color: #333; }
  .why-box { background: #1a1a2a; border-color: #333; }
  .metric-pill { background: #2a2a2a; color: #ccc; }
  .phase-label { color: #888; }
  .yr { color: #a89cf5; }
  .section-hd { color: #777; }
  .nav-btn { background: #2a2a2a; border-color: #3a3a3a; color: #bbb; }
  .nav-btn:hover { background: #333; }
  .nav-btn.on { background: #2a2560; border-color: #7c6ef5; color: #a89cf5; }
  .prog-track { background: #2a2a2a; }
}
@media (prefers-color-scheme: light) {
  body { color: #1a1a1a; }
  .card { background: #fff; border-color: #eee; }
  .card:hover { border-color: #ccc; background: #fafafa; }
  .card.selected { border-color: #534ab7; background: #f5f4fe; }
  .phase-bar { background: #f0f0f0; }
  .tag { background: #f0f0f0; color: #555; }
  .tag.core { background: #e6f4ea; color: #1a7a3a; }
  .tag.ai { background: #eeedfe; color: #534ab7; }
  .tag.platform { background: #e6f1fb; color: #185fa5; }
  .tag.enterprise { background: #fef3cd; color: #9a6700; }
  .tag.future { background: #fdecea; color: #c0392b; }
  .detail { background: #fafafa; border-color: #eee; }
  .why-box { background: #f5f4fe; border-color: #dddcf5; }
  .metric-pill { background: #f0f0f0; color: #555; }
  .phase-label { color: #999; }
  .yr { color: #534ab7; }
  .section-hd { color: #aaa; }
  .nav-btn { background: #f5f5f5; border-color: #ddd; color: #555; }
  .nav-btn:hover { background: #eee; }
  .nav-btn.on { background: #eeedfe; border-color: #534ab7; color: #534ab7; }
  .prog-track { background: #eee; }
}

.top-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.nav-btn { font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 20px; border: 1px solid; cursor: pointer; transition: all 0.18s; letter-spacing: 0.02em; }

.prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.prog-track { flex: 1; height: 3px; border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #534ab7, #1D9E75); border-radius: 2px; transition: width 0.4s ease; }
.prog-label { font-size: 11px; color: #999; white-space: nowrap; }

.phase-header { margin-bottom: 14px; }
.phase-title { font-size: 20px; font-weight: 700; line-height: 1.2; }
.phase-sub { font-size: 13px; margin-top: 4px; }
.phase-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.metric-pill { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }

.features-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; margin-bottom: 16px; }
.card { border: 1px solid; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.18s; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
.card-name { font-size: 13px; font-weight: 600; line-height: 1.3; flex: 1; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
.card-desc { font-size: 12px; line-height: 1.5; }

.detail { border: 1px solid; border-radius: 12px; padding: 16px; margin-bottom: 14px; min-height: 140px; }
.detail-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.detail-desc { font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
.why-box { border: 1px solid; border-radius: 8px; padding: 10px 14px; }
.why-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.why-items { display: flex; flex-direction: column; gap: 4px; }
.why-item { font-size: 12px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; }
.why-dot { width: 4px; height: 4px; border-radius: 50%; background: #534ab7; margin-top: 6px; flex-shrink: 0; }
@media (prefers-color-scheme: dark) { .why-dot { background: #a89cf5; } }

.section-hd { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.placeholder { font-size: 13px; text-align: center; padding: 30px; opacity: 0.5; }
.phase-bar { border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; }
.phase-bar-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
.phase-name { font-size: 13px; font-weight: 600; }
.phase-label { font-size: 12px; }
.yr { font-size: 22px; font-weight: 800; }
</style>
</head>
<body>

<div class="top-nav" id="topnav"></div>

<div class="prog-row">

  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:10%"></div></div>
  <span class="prog-label">2036</span>

<div class="phase-bar" id="phase-bar"></div>
<div class="section-hd" id="feat-label">Features — click any card to learn more</div>
<div class="features-grid" id="grid"></div>

const catLabels = { core: "Core", ai: "AI", platform: "Platform", enterprise: "Enterprise", future: "Vision" };
let phase = 0;
let selected = null;

function render() {
  const p = phases[phase];

  // Nav
  document.getElementById('topnav').innerHTML = phases.map((ph, i) =>
    `<button class="nav-btn ${i === phase ? 'on' : ''}" onclick="go(${i})">${ph.year}</button>`
  ).join('');

  // Progress
  document.getElementById('prog-yr').textContent = p.year;
  document.getElementById('prog-fill').style.width = ((phase + 1) / phases.length * 100) + '%';

  // Phase bar
  document.getElementById('phase-bar').innerHTML = `
    <div class="phase-bar-inner">
      <div>
        <div class="yr">${p.year}</div>
        <div class="phase-name">${p.name}</div>
        <div class="phase-label">${p.sub}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
        ${p.pills.map(pl => `<span class="metric-pill" style="font-size:11px;padding:3px 10px;border-radius:20px;">${pl}</span>`).join('')}
      </div>
    </div>
  `;

  // Features grid
  document.getElementById('grid').innerHTML = p.features.map((f, i) => `
    <div class="card ${selected === i ? 'selected' : ''}" onclick="select(${i})">
      <div class="card-top">
        <div class="card-name">${f.name}</div>
        <span class="tag ${f.cat}">${catLabels[f.cat]}</span>
      </div>
      <div class="card-desc" style="color:${selected === i ? 'inherit' : ''}">${f.desc}</div>
    </div>
  `).join('');

  renderDetail();
}

function renderDetail() {
  const p = phases[phase];
  const detail = document.getElementById('detail');
  if (selected === null || selected >= p.features.length) {
    detail.innerHTML = '<div class="placeholder">← Click a feature card to see the full rationale</div>';
    return;
  }
  const f = p.features[selected];
  detail.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;">
      <div class="detail-name">${f.name}</div>
      <span class="tag ${f.cat}">${catLabels[f.cat]}</span>
    </div>
    <div class="detail-desc">${f.desc}</div>
    <div class="why-box">
      <div class="why-title">Why this feature, why now</div>
      <div class="why-items">
        ${f.why.map(w => `<div class="why-item"><div class="why-dot"></div><span>${w}</span></div>`).join('')}
      </div>
    </div>
  `;
}

function select(i) {
  selected = selected === i ? null : i;
  render();
}

function go(i) {
  phase = i;
  selected = null;
  render();
}

render();
</script>
</body>
</html>
